name: flight watcher

on:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: install packages
        run: |
          pip install playwright requests
          playwright install

      - name: run script
        run: python flight.py
